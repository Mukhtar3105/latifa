<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Латифа — 1 годик — Тұсаукесер</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Great+Vibes&family=Playfair+Display+SC:wght@700&display=swap" rel="stylesheet">

<style>
:root{
  --rose:#b47a86;
  --rose2:#a96f7a;
  --ink:#2b2b2b;
  --card:rgba(255,255,255,.6);
}

*{box-sizing:border-box}
body{
  margin:0;
  font-family:"Cormorant Garamond",serif;
  background:#fff;
  color:var(--ink);
  overflow-x:hidden;
}

.bg{
  position:fixed;
  inset:0;
  background:url("./Background.png") center/cover no-repeat fixed;
  z-index:-3;
}
.veil{
  position:fixed;
  inset:0;
  background:radial-gradient(1000px 700px at 50% 30%, rgba(255,255,255,.6), rgba(255,255,255,.15));
  z-index:-2;
}

.wrap{
  max-width:580px;
  margin:auto;
  padding-bottom:140px;
}

section{
  position:relative;
  padding:28px 12px;
  text-align:center;
}

.card{
  background:var(--card);
  border-radius:22px;
  padding:24px 18px;
  box-shadow:0 10px 30px rgba(0,0,0,.1);
}

.script{
  font-family:"Great Vibes",cursive;
  color:var(--rose);
}

.title-name{
  font-size:76px;
  line-height:1;
}

.caps{
  text-transform:uppercase;
  letter-spacing:.14em;
  color:var(--rose2);
  font-size:20px;
}

.divider{
  height:1px;
  width:80%;
  margin:18px auto;
  background:rgba(0,0,0,.2);
}

/* decorations */
.decor{
  position:absolute;
  pointer-events:none;
  opacity:.85;
  animation:float 7s ease-in-out infinite;
}
@keyframes float{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-10px)}
}
.dl{left:-60px;top:20px;width:200px}
.dr{right:-60px;top:40px;width:200px}
.db{left:-60px;bottom:20px;width:200px}

/* butterfly */
.hero-butterfly{
  width:92px;
  margin:10px auto 0;
  cursor:pointer;
  animation:bob 2.6s ease-in-out infinite;
}
@keyframes bob{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(8px)}
}

/* date */
.date-title{font-size:50px}
.date-main{
  font-size:28px;
  font-weight:700;
  letter-spacing:.12em;
}
.date-time{
  display:block;
  font-size:24px;
  margin-top:6px;
}

/* calendar */
.cal{
  margin-top:18px;
  border-radius:18px;
  overflow:hidden;
  background:rgba(255,255,255,.45);
}
.dow,.grid{
  display:grid;
  grid-template-columns:repeat(7,1fr);
}
.dow div{
  padding:10px 0;
  font-size:14px;
}
.grid div{
  padding:16px 0;
  font-size:22px;
  position:relative;
}

/* 🔥 ЦИФРА 1 — ИСПРАВЛЕНА */
.first{
  font-family:"Playfair Display SC",serif;
  font-size:44px;
  font-weight:700;
  color:var(--rose);
  text-shadow:
    0 6px 18px rgba(180,122,134,.35),
    0 0 2px rgba(180,122,134,.5);
}

/* 11 */
.sel{
  font-weight:800;
}
.sel::after{
  content:"";
  position:absolute;
  inset:0;
  margin:auto;
  width:44px;
  height:44px;
  border-radius:50%;
  background:rgba(180,122,134,.25);
  z-index:-1;
}
.butterfly-behind{
  position:absolute;
  left:50%;
  top:50%;
  width:56px;
  transform:translate(-50%,-70%);
  z-index:-2;
  animation:flutter 3s ease-in-out infinite;
}
@keyframes flutter{
  0%,100%{transform:translate(-50%,-70%)}
  50%{transform:translate(-50%,-82%)}
}

/* form */
form{display:grid;gap:14px;margin-top:14px}
input,button{
  padding:14px;
  border-radius:999px;
  font-size:18px;
  border:1px solid rgba(0,0,0,.2);
}
button{
  background:var(--rose);
  color:#fff;
  border:none;
}

/* 🎵 CUSTOM MUSIC PLAYER */
.music{
  position:fixed;
  bottom:16px;
  left:50%;
  transform:translateX(-50%);
  background:rgba(255,255,255,.85);
  backdrop-filter:blur(6px);
  border-radius:999px;
  padding:8px 16px;
  box-shadow:0 8px 20px rgba(0,0,0,.15);
  display:flex;
  align-items:center;
  gap:12px;
  z-index:10;
}
.music button{
  border:none;
  background:var(--rose);
  color:#fff;
  width:44px;
  height:44px;
  border-radius:50%;
  font-size:18px;
  cursor:pointer;
}
.music span{
  font-size:14px;
  letter-spacing:.08em;
  color:var(--rose2);
}
</style>
</head>

<body>
<div class="bg"></div>
<div class="veil"></div>

<main class="wrap">

<section>
<img src="./element_2.png" class="decor dl">
<img src="./element_3.png" class="decor dr">
<div class="card">
  <div class="script title-name">Латифа</div>
  <p class="caps">1 годик</p>
  <p class="caps">Тұсаукесер</p>
  <div class="divider"></div>
  <img src="./element_6.png" class="hero-butterfly" id="scrollToForm">
  <p class="caps" style="margin-top:22px">Прокрутите вниз</p>
</div>
</section>

<section>
<img src="./element_4.png" class="decor db">
<div class="card">
  <div class="script date-title">Дата торжества</div>
  <div class="date-main">
    11 апреля 2026 года
    <span class="date-time">время 14:00</span>
  </div>

  <div class="cal">
    <div class="dow">
      <div>пн</div><div>вт</div><div>ср</div><div>чт</div><div>пт</div><div>сб</div><div>вс</div>
    </div>
    <div class="grid">
      <div></div><div></div>
      <div class="first">1</div><div>2</div><div>3</div><div>4</div><div>5</div>
      <div>6</div><div>7</div><div>8</div><div>9</div><div>10</div>
      <div class="sel">
        <img src="./element_6.png" class="butterfly-behind">
        11
      </div>
      <div>12</div><div>13</div><div>14</div><div>15</div><div>16</div><div>17</div><div>18</div>
      <div>19</div><div>20</div><div>21</div><div>22</div><div>23</div><div>24</div><div>25</div>
      <div>26</div><div>27</div><div>28</div><div>29</div><div>30</div>
    </div>
  </div>
</div>
</section>

<section id="rsvp">
<div class="card">
  <p class="caps">Подтвердите присутствие</p>
  <form>
    <input placeholder="Ваше имя" required>
    <label><input type="radio" name="a"> Обязательно приду</label>
    <label><input type="radio" name="a"> Приду со второй половинкой</label>
    <label><input type="radio" name="a"> Не смогу присутствовать</label>
    <button>Отправить</button>
  </form>
</div>
</section>

</main>

<!-- 🎵 Audio -->
<audio id="bgMusic" loop>
  <source src="./Серік Ибрагимов feat. Еркеш Хасен - Қызым (Live).mp3" type="audio/mpeg">
</audio>

<div class="music">
  <button id="musicBtn">❚❚</button>
  <span>Қызым • Live</span>
</div>

<script>
const music = document.getElementById("bgMusic");
const btn = document.getElementById("musicBtn");

/* autoplay (Android/desktop) */
music.play().catch(()=>{});

/* iOS fallback: play on first touch */
document.addEventListener("click",()=>{
  if(music.paused) music.play().catch(()=>{});
},{once:true});

/* toggle */
btn.onclick=()=>{
  if(music.paused){
    music.play();
    btn.textContent="❚❚";
  }else{
    music.pause();
    btn.textContent="▶";
  }
};

/* scroll */
document.getElementById("scrollToForm").onclick=()=>{
  document.getElementById("rsvp").scrollIntoView({behavior:"smooth"});
};
</script>

</body>
</html>
